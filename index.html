<!DOCTYPE html>

<html>
<head>
  <title>Home - Mat</title>
  <script src="script.js"></script>
  <style>
    body {
      font-family: 'Press Start 2P', monospace;
      background-color: black;
      color: green;
      line-height: 1.5;
    }
    .main-button {
      font-family: 'Press Start 2P', monospace; /* same font as the body */
      background-color: black;
      color: green;
      border: 2px solid green;
      padding: 8px 12px;
      cursor: pointer;
      margin: 5px 0; /* space between buttons */
      text-transform: uppercase; /* optional, looks hacker-ish */
    }

    .main-button:hover {
      background-color: green;
      color: black;
    }
    input {
      font-family: 'Press Start 2P', monospace;
      background-color: black;
      color: green;
      border: 2px solid green;
      padding: 5px 10px;
      width: 200px;
      margin: 5px 0;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Mat and Dan's Pages</h1>
  
  <h3>All of the pages WE ARE working on are here - as long as WE remember to add them...</h3>
  
  <button type="button" id='calcRedirect' class="main-button"
    onClick="calculator()">Calculator</button>
  
  <button type="button" id='virusRedirect' class="main-button"
    onClick="virus()">Web Virus Thingy</button>
  
  <button type="button" id='passGameRedirect' class="main-button"
    onClick="passwordGame()">Password Game</button>
  
  <button type="button" id='DanSiteRedirect' class="main-button"
    onClick="DansSiteRedirect()">Redirect to Dan's site</button>
  
  <h4>Search other site (in repository)</h4>
  
  <input id='input'>

  <button type="button" class="main-button"
    onClick="search()">Submit</button>

  <h4>Search other site (anywhere)</h4>
  
  <input id='input2'>

  <button type="button" class="main-button"
    onClick="search2()">Submit</button>
</body>
</html>
