<!DOCTYPE html>
<html>
  <head>
    <style>
      #container {
        display: flex;
        justify-content: space-between;
        height: 100vh;
      }

      #left {
        width: 60%;
      }

      #right {
        width: 20%;
        background: lightgrey;

        display: flex;
        flex-direction: column;
        padding: 10px;
        gap: 10px;
      }

      #hierarchy {
        width: 20%;
        flex-direction: column;
        background: lightblue;
        flex: 1;
        overflow-y: auto;
      }
    </style>
    <script>
      let type;
      let text;
      function createElement() {
        type = document.getElementById('type-').value;
        text = document.getElementById('text').value;
        let el = document.createElement(type);
        el.textContent = text;
        document.getElementById('page').appendChild(el);
      }
    </script>
  </head>
  <body>
    
    <div id="container">
      
      <div id="left">
        <div id="structure"></div>
        <div id="page"></div>
      </div>
      
      <div id="right">
        <input id="type-" placeholder="Type (eg: button, p, h1)">
        <input id="text" placeholder="Text">
        <button type="button" id="elementMaker"
          onClick="createElement()">Add Element</button>
      </div>
        <div id="hierarchy"></div>
    </div>
    
  </body>
</html>
