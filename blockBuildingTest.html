<!DOCTYPE html>
<html>
  <head>
    <style>
      #container {
        display: flex;
        height: 100vh;
      }

      #left {
        width: 60%;
        padding: 10px;
      }

      #right {
        width: 20%;
        background: lightgrey;
        display: flex;
        flex-direction: column;
        padding: 10px;
        gap: 10px;
      }

      #hierarchy {
        width: 20%;
        background: lightblue;
        overflow-y: auto;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <div id="container">

      <div id="left">
        <div id="structure"></div>
        <div id="page"></div>
      </div>

      <div id="right">
        <div>
          <input id="headingId" placeholder="Unique ID">
          <input id="headingText" placeholder="Heading text">
          <button onclick="newHeading()">Add Heading</button>
        </div>

        <div>
          <input id="paragraphId" placeholder="Unique ID">
          <input id="paragraphText" placeholder="Paragraph text">
          <button onclick="newParagraph()">Add Paragraph</button>
        </div>

        <div>
          <input id="buttonId" placeholder="Unique ID">
          <input id="buttonText" placeholder="Button text">
          <button onclick="newButton()">Add Button</button>
        </div>

        <div>
          <textarea id="scriptText" placeholder="Code..." cols="36"></textarea>
          <button onclick="editScript()">Update Script</button>
        </div>
      </div>

      <div id="hierarchy"></div>

    </div>

    <script>
      let fn = null;

      function createElement(type, text, position, id) {
        if (!id) {
          alert("give it an id bro");
          return;
        }

        if (document.getElementById(id)) {
          alert("id already exists 💀");
          return;
        }

        let el = document.createElement(type);
        el.textContent = text;
        el.id = id;

        document.getElementById(position).appendChild(el);

        let item = document.createElement("div");
        item.textContent = type + ": " + text + " (id: " + id + ")";
        item.style.cursor = "pointer";

        document.getElementById("hierarchy").appendChild(item);

        item.onclick = () => {
          let input = prompt("Edit or delete (leave blank):", el.textContent);

          if (input === null) return;

          if (input === "") {
            el.remove();
            item.remove();
          } else {
            el.textContent = input;
            item.textContent = type + ": " + input + " (id: " + id + ")";
          }
        };

        return el;
      }

      function newHeading() {
        let text = document.getElementById("headingText").value;
        let id = document.getElementById("headingId").value;
        createElement("h1", text, "page", id);
      }

      function newParagraph() {
        let text = document.getElementById("paragraphText").value;
        let id = document.getElementById("paragraphId").value;
        createElement("p", text, "page", id);
      }

      function newButton() {
        let text = document.getElementById("buttonText").value;
        let id = document.getElementById("buttonId").value;

        let btn = createElement("button", text, "page", id);

        if (btn) {
          btn.addEventListener("click", () => {
            console.log("Clicked:", id);
          });
        }
      }

      function editScript() {
        let code = document.getElementById("scriptText").value;

        try {
          fn = new Function(code);
        } catch (error) {
          console.error("Script error:", error);
          alert("Script error");
        }
      }

      // safe background execution
      setInterval(() => {
        if (fn) {
          try {
            fn();
          } catch (err) {
            console.error("Runtime error:", err);
          }
        }
      }, 1000);
    </script>

  </body>
</html>
