<!DOCTYPE html>
<html>
  <head>
    <style>
      #container {
        display: flex;
        justify-content: space-between;
      }

      #left {
        
      }

      #right {
        background: lightgrey;
      }

      #hierarchy {
        background: lightblue;
      }
    </style>
    <script>
      function newHeading() {
        let heading = document.createElement("h1");
        heading.textContent = document.getElementById('headingTextInput').value;
        document.getElementById('page').appendChild(heading);
      }
      
      function newParagraph() {
        let paragraph = document.createElement("p");
        paragraph.textContent = document.getElementById('paragraphTextInput').value;
        document.getElementById('page').appendChild(paragraph);
      }
    </script>
  </head>
  <body>
    
    <div id="container">
      
      <div id="left">
        <div id="structure"></div>
        <div id="page"></div>
      </div>
      
      <div id="right">
        <div id="addHeadingButton">
          <button id="addHeading"
            onClick="newHeading()">Add Heading</button>
          <input id="headingTextInput" placeholder="Heading">
        </div>
      </div>
        
        <div id="addParagraphButton">
          <button id="addParagraph"
            onClick="newParagraph()">Add Paragraph</button>
          <input id="paragraphTextInput" placeholder="Paragraph">
        </div>
        <div id="hierarchy">
          
        </div>
      </div>
      
    </div>
    
  </body>
</html>
