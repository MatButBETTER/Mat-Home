<!DOCTYPE html>
<html>
<head>
  <title>Dan's Site</title>
  <script>
    console.log("Hello")
  </script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f0f0f0;
    }
    h1 {
      color: #333;
    }
    .music-controls {
      margin: 20px 0;
      padding: 20px;
      background-color: white;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1>Hello</h1>
  
  <!-- Audio element for background music with multiple formats -->
  <audio id="bgMusic" loop>
    <source src="coolauramoozig.mp3" type="audio/mpeg">
    <source src="coolauramoozig.ogg" type="audio/ogg">
    <source src="coolauramoozig.wav" type="audio/wav">
    Your browser does not support the audio element.
  </audio>
  
  <!-- Music controls -->
  <div class="music-controls">
    <h2>🎵 Music Player</h2>
    <button onclick="playMusic()">▶️ Play Music</button>
    <button onclick="pauseMusic()">⏸️ Pause Music</button>
    <button onclick="changeVolume()">🔊 Mute/Unmute</button>
    <button onclick="setVolume(30)">🔇 Low Volume</button>
    <button onclick="setVolume(70)">🔉 High Volume</button>
  </div>
  
  <script>
    const audio = document.getElementById('bgMusic');
    
    function playMusic() {
      audio.play();
      console.log("Music playing");
    }
    
    function pauseMusic() {
      audio.pause();
      console.log("Music paused");
    }
    
    function changeVolume() {
      if (audio.volume > 0) {
        audio.volume = 0;
        console.log("Muted");
      } else {
        audio.volume = 0.5;
        console.log("Unmuted - Volume set to 50%");
      }
    }
    
    function setVolume(percentage) {
      audio.volume = percentage / 100;
      console.log("Volume set to " + percentage + "%");
    }
    
    // Auto-play music when page loads (optional)
    // Uncomment the line below to auto-play
    // window.addEventListener('load', playMusic);
  </script>
</body>
</html>
