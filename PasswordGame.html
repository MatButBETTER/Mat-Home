 <!DOCTYPE html>
 <head>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
   <script src="script.js"></script>
   <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
   <style>
     body {
       font-family: 'Roboto Mono', monospace;
     }

     p {
       color: red;
     }
     p:hover {
       color: lightcoral;
     }
   </style>
   <script>
     let minLength;
     let maxLength;
     let containsCapitals;
     let containsNumbers;
     let input;
     let errors = [];

     function stage1() {
       if (input.length < 8) {
         minLength = false;
       } else {
         minLength = true;
       }

       if (input.length > 30) {
         maxLength = true;
       } else {
         maxLength = false;
       }
     }

     function stage2() {
        containsCapitals = /[A-Z]/.test(input);
        containsNumbers = /[0-9]/.test(input);
     }
    
     setInterval(() => {
       input = document.getElementById('input').value;

     errors = [];

       stage1();

       if (minLength === false) {
         errors.push("Must be at least 8 characters");
       }

       if (maxLength === true) {
         errors.push("Too long!");
       }

       if ((minLength === true) && (maxLength === false)) {
           stage2()
       }

       if (!containsCapitals) {
         errors.push("Must contain a capital letter");
       }

       if (!containsNumbers) {
         errors.push("Must contain a number");
       }
       
       document.getElementById('errors').textContent = errors.join(", ");
     }, 100);
   </script>
 </head>
 <body>
   <input id='input'>
 
   <p id='errors'>
 </body>
