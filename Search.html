<!DOCTYPE html>
<html>
  <head>
    <script>
      function open() {
        let value = document.getElementById('input').value
        window.open("https://" + value target="_self")
      }
    </script>
  </head>
  <body>
    <input id='input' placeholder="Type something">
    
    <button type="button" id='button'
      onClick="open()">Search!</button>
    
  </body>
</html>
