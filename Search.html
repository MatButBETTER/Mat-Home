<!DOCTYPE html>
<html>
  <head>
    <script>
      let value;
      function open() {
        value = document.getElementById('input')
        window.open(value target="_self")
      }
    </script>
  </head>
  <body>
    <input id='input' placeholder="Type something">
    
    <button type="button" id='button'
      onClick="open()">Search!</button>
    
  </body>
</html>
